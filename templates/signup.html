{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">

                <h2 class="mb-4 text-center">
                    Регистрация
                </h2>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Пароль
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control">
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">
                        Зарегистрироваться
                    </button>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
